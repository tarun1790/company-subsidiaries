# Enterprise Multi-LLM Architecture v4.1 Configuration

inference:
  # Supported backends: "ollama", "vllm", "openai_compatible", "llama.cpp"
  backend: "ollama"
  base_url: "http://localhost:11434"
  # Set to false to disable Gemini API entirely and run 100% offline
  allow_cloud_fallback: false

capabilities:
  entity_resolution:
    primary: "qwen3:14b"
    fallback_chain:
      - "qwen2.5:14b"
      - "qwen2.5:7b"
      - "deepseek-r1:8b"
      - "gemma2:9b"
    cloud_fallback: "gemini-2.5-pro"

  document_understanding:
    primary: "qwen3:14b"
    fallback_chain:
      - "qwen2.5:14b"
      - "deepseek-r1:8b"
      - "gemma2:9b"
    cloud_fallback: "gemini-2.5-pro"

  reasoning:
    primary: "deepseek-r1:14b"
    fallback_chain:
      - "deepseek-r1:8b"
      - "qwen2.5:14b"
      - "gemma2:9b"
    cloud_fallback: "gemini-2.5-pro"

  classification:
    primary: "gemma3:12b"
    fallback_chain:
      - "gemma2:9b"
      - "qwen2.5:14b"
      - "qwen2.5:7b"
    cloud_fallback: "gemini-2.5-flash"

  json_generation:
    primary: "qwen3:14b"
    fallback_chain:
      - "qwen2.5:14b"
      - "gemma2:9b"
    cloud_fallback: "gemini-2.5-flash"

  code_generation:
    primary: "qwen3:14b"
    fallback_chain:
      - "qwen2.5:14b"
    cloud_fallback: "gemini-2.5-flash"

  verification:
    primary: "deepseek-r1:14b"
    fallback_chain:
      - "deepseek-r1:8b"
      - "qwen2.5:14b"
    cloud_fallback: "gemini-2.5-pro"

  general:
    primary: "qwen3:14b"
    fallback_chain:
      - "qwen2.5:14b"
      - "gemma2:9b"
    cloud_fallback: "gemini-2.5-flash"
